spring.application.name=Hobist

server.servlet.context-path=/api/v1

#db config
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.url=${DATASOURCE_URL}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

#flyway config
spring.flyway.url=${DATASOURCE_URL}
spring.flyway.user=${DATASOURCE_USERNAME}
spring.flyway.password=${DATASOURCE_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true

#JWT config
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

frontend.address=${FRONTEND_ADDRESS}

#M.G: remove later
file.upload-dir=C:/Users/Marko/Desktop/Java/Hobist/uploads

#mail server
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sarlosarlo579@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

logging.level.org.springframework.security=DEBUG
